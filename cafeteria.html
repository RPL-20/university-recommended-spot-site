<!DOCTYPE html>
<html>
  <head>
      <meta charset="UTF-8">
      <title>おすすめ食堂</title>
      <meta name="description" content="cafeteria">
      <meta name="viewport" content="width=device-width">
      <link href="css/cafeteria.css" rel="stylesheet">
  </head>
  <body>
    <header></header>
    <main>
      <div>
          <h1 class="title">おすすめ食堂</h1>
          <p>ここでは、おすすめの食堂を紹介していきます。</p>
          <h2 class="cafe-name">パレット</h2>
          <img class="cafe-image" src="images/cafeteria/palette.jpg" alt="パレット">
          <p>パレットには丼や麺などさまざまなメニューがあります。</p>
          <div class="box26">
              <span class="box-title">基本情報</span>
              <p>
                場所:タワー1階<br/>
                営業時間:11:00～14:00
              </p>
          </div>
          <h4>メニュー例</h4>
          <div class="image-row">
              <div class="image-container">
                  <img src="images/cafeteria/chicken.png" alt="Image 1">
                  <p>チキントマト南蛮</p>
              </div>
              <div class="image-container">
                  <img src="images/cafeteria/kimchi.png" alt="Image 2">
                  <p>温玉豚キムチ丼</p>
              </div>
              <div class="image-container">
                  <img src="images/cafeteria/cold-noodles.png" alt="Image 3">
                  <p>蒸し鶏ごま冷麺</p>
              </div>
          </div>
          <h2 class="cafe-name">スガキヤ</h2>
          <img class="cafe-image" src="images/cafeteria/sugakiya.png" alt="スガキヤ">
          <p>アプリのクーポンを使うことで50円引きでラーメンを食べられます。</p>
          <div class="box26">
              <span class="box-title">基本情報</span>
              <p>
                場所:6号館 1F<br/>
                営業時間:月曜～金曜 / 11:00～14:00
              </p>
          </div>
          <h4>メニュー例</h4>
          <div class="image-row">
              <div class="image-container">
                  <img src="images/cafeteria/sugakiya-1.png" alt="Image 1">
                  <p>ラーメン</p>
              </div>
              <div class="image-container">
                  <img src="images/cafeteria/sugakiya-2.png" alt="Image 2">
                  <p>特性ラーメン</p>
              </div>
              <div class="image-container">
                  <img src="images/cafeteria/sugakiya-3.png" alt="Image 3">
                  <p>ざるラーメン</p>
              </div>
          </div>
      </div>
    </main>
    <footer class="footer"></footer>
  </body>
</html>
